<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c1a12"/>
      <stop offset="0.55" stop-color="#1b120c"/>
      <stop offset="1" stop-color="#140b07"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"    stop-color="#ffd24a"/>
      <stop offset="0.5"  stop-color="#ff8a3c"/>
      <stop offset="1"    stop-color="#f7534e"/>
    </linearGradient>
    <linearGradient id="mercury" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"   stop-color="#f7534e"/>
      <stop offset="0.6" stop-color="#ff8a3c"/>
      <stop offset="1"   stop-color="#ffd24a"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="vig" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#ff8a3c" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ff8a3c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tile -->
  <rect x="14" y="14" width="228" height="228" rx="50" fill="url(#bg)"
        stroke="#ff8a3c" stroke-opacity="0.30" stroke-width="2.5"/>
  <rect x="14" y="14" width="228" height="228" rx="50" fill="url(#vig)"/>

  <!-- Rising heat waves -->
  <g fill="none" stroke="url(#heat)" stroke-width="7" stroke-linecap="round"
     stroke-opacity="0.85" filter="url(#glow)">
    <path d="M150 66 q16 -14 0 -30 q-16 -14 0 -30"/>
    <path d="M184 74 q16 -14 0 -30 q-16 -14 0 -30"/>
    <path d="M218 66 q16 -14 0 -30 q-16 -14 0 -30"/>
  </g>

  <!-- Thermometer -->
  <g filter="url(#glow)">
    <!-- stem outline -->
    <rect x="70" y="52" width="34" height="118" rx="17"
          fill="#0f0a07" stroke="#ff8a3c" stroke-opacity="0.55" stroke-width="4"/>
    <!-- bulb -->
    <circle cx="87" cy="192" r="30"
            fill="#0f0a07" stroke="#ff8a3c" stroke-opacity="0.55" stroke-width="4"/>
    <!-- mercury column -->
    <rect x="79" y="96" width="16" height="80" rx="8" fill="url(#mercury)"/>
    <circle cx="87" cy="192" r="20" fill="url(#mercury)"/>
    <!-- tick marks -->
    <g stroke="#ffd7a1" stroke-opacity="0.65" stroke-width="3" stroke-linecap="round">
      <line x1="110" y1="74"  x2="122" y2="74"/>
      <line x1="110" y1="98"  x2="122" y2="98"/>
      <line x1="110" y1="122" x2="122" y2="122"/>
      <line x1="110" y1="146" x2="122" y2="146"/>
    </g>
  </g>
</svg>
